name: Relances automatiques

on:
  schedule:
    - cron: '0 8 * * *'  # Tous les jours à 8h UTC (9h Paris)
  workflow_dispatch:  # Permet de lancer manuellement

jobs:
  relances:
    runs-on: ubuntu-latest
    steps:
      - name: Relances factures impayées
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://dep-pro.fr/api/relances/run)
          echo "Factures status: $response"
          if [ "$response" != "200" ]; then
            echo "Erreur factures: statut HTTP $response"
            exit 1
          fi

      - name: Relances devis non signés
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://dep-pro.fr/api/relances/devis)
          echo "Devis status: $response"
          if [ "$response" != "200" ]; then
            echo "Erreur devis: statut HTTP $response"
            exit 1
          fi
